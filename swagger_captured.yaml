openapi: 3.0.0
info:
  title: traffic.mitm Mitmproxy2Swagger
  version: 1.0.0
servers:
- url: http://localhost:8888
  description: The default server
paths:
  /workshop/api/shop/orders/all:
    get:
      summary: GET all
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /workshop/api/mechanic/service_requests:
    get:
      summary: GET service_requests
      responses:
        '401':
          description: Unauthorized
